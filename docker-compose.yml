version: "3.9"

services:
  neo4j:
    image: neo4j:5.24
    container_name: rbac-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/ktrwbz123
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: [ "CMD-SHELL", "cypher-shell -u neo4j -p ktrwbz123 'RETURN 1'" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api:
    build: .
    container_name: rbac-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: ktrwbz123

volumes:
  neo4j-data:
  neo4j-logs: